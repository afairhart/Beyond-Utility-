<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Beyond Utility Water Ventures</title>
  <meta name="description" content="Pre-seed and seed venture capital for the next generation of water infrastructure.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080E1A;
      --blue: #4B7BF5;
      --blue-light: #7BA1F7;
      --blue-dim: rgba(75, 123, 245, 0.15);
      --gold: #D4A84B;
      --gold-dark: #B8903D;
      --text: rgba(255, 255, 255, 0.88);
      --text-dim: rgba(255, 255, 255, 0.45);
    }

    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: #fff;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body.modal-open { overflow: hidden; }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 28px 40px;
      padding-top: calc(28px + env(safe-area-inset-top));
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(8, 14, 26, 0.8);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }

    .nav-logo {
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 1.35rem;
      color: #fff;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-logo span { color: var(--gold); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .nav-link {
      color: var(--text);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-link:hover { color: var(--gold); }

    .nav-login {
      color: #fff;
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 18px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 5px;
      transition: border-color 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .nav-login:hover {
      border-color: var(--gold);
      background: rgba(212, 168, 75, 0.08);
    }

    /* ── HERO ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 100px 24px 40px;
    }

    .hero h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2.8rem, 6vw, 4.8rem);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.03em;
      max-width: 800px;
      margin-bottom: 20px;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--blue-light);
      white-space: nowrap;
    }

    .hero-sub {
      color: var(--text);
      font-size: 1.05rem;
      line-height: 1.6;
      max-width: 440px;
      margin-bottom: 32px;
    }

    /* ── TYPEWRITER ── */
    .typewriter {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 500;
      color: var(--gold);
      min-height: 1.6em;
      margin-bottom: 12px;
    }

    .typewriter-cursor {
      color: var(--gold);
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* ── DIVIDER ── */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--blue);
      opacity: 0.3;
      margin: 0 auto;
    }

    /* ── INFO ── */
    .info {
      padding: 80px 24px;
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }

    .info p {
      font-size: 1.05rem;
      line-height: 1.75;
      color: var(--text);
    }

    /* ── HERO CTA ── */
    .hero-cta {
      display: inline-block;
      padding: 20px 60px;
      font-family: 'Outfit', sans-serif;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #fff;
      background: var(--blue);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 0 24px rgba(75, 123, 245, 0.3);
    }

    .hero-cta:hover {
      background: var(--blue-light);
      transform: translateY(-2px);
      box-shadow: 0 0 36px rgba(75, 123, 245, 0.45);
    }

    .hero-cta:active {
      transform: scale(0.97);
      background: var(--blue-light);
      box-shadow: 0 0 20px rgba(75, 123, 245, 0.25);
    }

    /* ── VIDEO MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      position: relative;
      width: 90%;
      max-width: 640px;
    }

    .modal-content iframe {
      width: 100%;
      height: 600px;
      border: none;
      border-radius: 24px;
    }

    .modal-close {
      position: absolute;
      top: -40px;
      right: 0;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.6rem;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .modal-close:hover { opacity: 1; }

    /* ── FOOTER ── */
    .footer {
      padding: 32px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 0.75rem;
    }

    .footer-left { color: var(--text-dim); }

    .footer-right {
      display: flex;
      gap: 20px;
    }

    .footer-right a {
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-right a:hover { color: var(--gold); }

    /* ── ANIMATIONS ── */
    .fade-in {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-in.visible { opacity: 1; transform: translateY(0); }
    .fade-in.d1 { transition-delay: 0.15s; }
    .fade-in.d2 { transition-delay: 0.3s; }
    .fade-in.d3 { transition-delay: 0.45s; }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      /* Nav */
      .nav { padding: 14px 16px; padding-top: calc(14px + env(safe-area-inset-top)); }
      .nav-logo { font-size: 0.85rem; }
      .nav-right { gap: 8px; }
      .nav-link { font-size: 0.65rem; min-height: 44px; display: inline-flex; align-items: center; }
      .nav-login { font-size: 0.65rem; padding: 0 12px; min-height: 44px; display: inline-flex; align-items: center; }

      /* Hero — use dvh so it accounts for mobile browser chrome */
      .hero {
        padding: 90px 20px 32px;
        min-height: auto;
      }
      .hero h1 { font-size: clamp(2rem, 8vw, 2.8rem); margin-bottom: 16px; }
      .typewriter { font-size: 1.25rem; }
      .hero-sub { font-size: 0.92rem; line-height: 1.55; margin-bottom: 28px; max-width: 340px; }
      .hero-cta {
        padding: 16px 32px;
        font-size: 1rem;
        width: 100%;
        max-width: 300px;
        min-height: 52px;
        border-radius: 8px;
      }

      /* Modal — nearly full-screen on mobile */
      .modal-overlay { align-items: flex-end; }
      .modal-content {
        width: 100%;
        max-width: 100%;
        height: 90vh;
        height: 90dvh;
      }
      .modal-content iframe {
        height: 100%;
        border-radius: 20px 20px 0 0;
      }
      .modal-close {
        position: fixed;
        top: 12px;
        top: calc(12px + env(safe-area-inset-top));
        right: 16px;
        font-size: 2rem;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.5);
        border-radius: 50%;
        z-index: 1001;
      }

      /* Footer */
      .footer {
        flex-direction: column;
        gap: 12px;
        text-align: center;
        padding: 24px 20px;
        padding-bottom: calc(24px + env(safe-area-inset-bottom));
      }
      .footer-right { flex-direction: column; gap: 10px; }
    }

    /* Reduce motion for users who prefer it */
    @media (prefers-reduced-motion: reduce) {
      .fade-in { opacity: 1; transform: none; transition: none; }
      .modal-overlay { transition: none; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="#" class="nav-logo">Beyond Utility <span>Water Ventures</span></a>
    <div class="nav-right">
      <a href="login.html" class="nav-login">Log In</a>
    </div>
  </nav>

  <section class="hero" id="pitch">
    <h1 class="fade-in">Investing in the <em>new water economy</em></h1>
    <p class="typewriter fade-in d1"><span id="typewriter-text"></span><span class="typewriter-cursor">|</span></p>
    <p class="hero-sub fade-in d2">Pre-seed and seed capital for the technologies and business models reshaping water infrastructure globally.</p>
    <button class="hero-cta fade-in d3" id="openPitch">Share Your Story</button>
  </section>

  <div class="divider"></div>


  <footer class="footer">
    <span class="footer-left">&copy; 2026 Beyond Utility Water Ventures</span>
    <div class="footer-right">
      <a href="mailto:alex@beyondutilityventures.com">alex@beyondutilityventures.com</a>
      <a href="https://www.linkedin.com/in/alexanderfairhart/" target="_blank" rel="noopener">LinkedIn</a>
      <a href="privacy.html">Privacy Policy</a>
    </div>
  </footer>

  <!-- Video Modal -->
  <div class="modal-overlay" id="videoModal">
    <div class="modal-content">
      <button class="modal-close" id="closeModal">&times;</button>
      <iframe id="videoFrame" allow="camera *; microphone *; autoplay *; encrypted-media *; fullscreen *; display-capture *;"></iframe>
    </div>
  </div>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.2 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    document.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        const t = document.querySelector(a.getAttribute('href'));
        if (t) t.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    });

    // Typewriter effect
    const typewriterEl = document.getElementById('typewriter-text');
    const categories = [
      'Water-as-a-Service',
      'Decentralized Treatment',
      'Utility 2.0',
      'Distributed Reuse',
      'Modular Infrastructure',
      'Onsite Recycling',
      'Water Microgrids',
      'Pay-per-Gallon',
      'Cluster Systems',
      'Mobile Treatment',
      'Outcome-Based Contracts',
      'Adaptive Infrastructure',
      'Digital Utilities',
      'Autonomous Plants',
      'Containerized Systems',
      'Infrastructure Platforms',
      'Circular Water',
      'Demand Aggregation',
      'Asset-Light Utilities',
      'Smart District Water',
      'Industrial Symbiosis',
      'Managed Aquifer Recharge',
      'Private Water Networks',
      'Water Marketplaces',
      'Performance Contracting',
      'Plug-and-Play Treatment',
      'Community-Scale Systems',
      'Franchise Utilities',
      'Subscription Water',
      'Resilience Hubs',
      'Localized Desalination',
      'Treatment-as-a-Platform',
      'Water Credits',
      'Reuse Districts',
      'Embedded Infrastructure',
      'Hybrid Utilities',
      'Infrastructure Funds',
      'Micro-Utilities',
      'Smart Catchments',
      'Water Cooperatives',
      'Dynamic Pricing',
      'Portfolio Utilities',
      'Resilience Financing',
      'Rapid Deployment Systems',
      'Pop-Up Treatment',
      'Edge Infrastructure',
      'Networked Reuse',
      'Capital-Light Water',
      'Utility Partnerships',
      'Distributed Storage',
    ];
    const typeSpeed = 70;
    const deleteSpeed = 40;
    const holdTime = 2000;
    let catIndex = 0;
    let charIndex = 0;
    let isDeleting = false;

    function typewriterTick() {
      const current = categories[catIndex];
      if (!isDeleting) {
        typewriterEl.textContent = current.slice(0, charIndex + 1);
        charIndex++;
        if (charIndex >= current.length) {
          isDeleting = true;
          setTimeout(typewriterTick, holdTime);
          return;
        }
        setTimeout(typewriterTick, typeSpeed);
      } else {
        charIndex--;
        typewriterEl.textContent = current.slice(0, charIndex);
        if (charIndex <= 0) {
          isDeleting = false;
          catIndex = (catIndex + 1) % categories.length;
          setTimeout(typewriterTick, 400);
          return;
        }
        setTimeout(typewriterTick, deleteSpeed);
      }
    }

    // Respect reduced motion — show static text instead
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      typewriterEl.textContent = categories[0];
    } else {
      setTimeout(typewriterTick, 800);
    }

    // Video modal
    const modal = document.getElementById('videoModal');
    const frame = document.getElementById('videoFrame');
    const videoUrl = 'https://www.videoask.com/fxwqt6dkl';

    function openModal() {
      frame.src = videoUrl;
      modal.classList.add('active');
      document.body.classList.add('modal-open');
    }

    function closeModal() {
      modal.classList.remove('active');
      document.body.classList.remove('modal-open');
      frame.src = '';
    }

    document.getElementById('openPitch').addEventListener('click', openModal);
    document.getElementById('closeModal').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>

</body>
</html>
