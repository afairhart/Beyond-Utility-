<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Partner Login — Beyond Utility Water Ventures</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080E1A;
      --blue: #4B7BF5;
      --blue-light: #7BA1F7;
      --blue-dim: rgba(75, 123, 245, 0.15);
      --gold: #D4A84B;
      --gold-dark: #B8903D;
      --text: rgba(255, 255, 255, 0.88);
      --text-dim: rgba(255, 255, 255, 0.45);
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: #fff;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    .nav {
      padding: 28px 40px;
      padding-top: calc(28px + env(safe-area-inset-top));
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 1.05rem;
      color: #fff;
      text-decoration: none;
    }

    .nav-logo span { color: var(--gold); }

    .nav-back {
      color: var(--text);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-back:hover { color: var(--gold); }

    /* ── LOGIN FORM ── */
    .login-wrapper {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 24px;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
    }

    .login-card h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: #fff;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .form-group input:focus {
      border-color: var(--blue);
      background: rgba(75, 123, 245, 0.06);
    }

    .form-group input::placeholder {
      color: var(--text-dim);
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      margin-top: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: #fff;
      background: var(--blue);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 0 24px rgba(75, 123, 245, 0.25);
    }

    .login-btn:hover {
      background: var(--blue-light);
      transform: translateY(-1px);
      box-shadow: 0 0 32px rgba(75, 123, 245, 0.4);
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .login-error {
      margin-top: 16px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #f87171;
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.2);
      border-radius: 8px;
      display: none;
    }

    .login-error.visible {
      display: block;
    }

    /* ── FOOTER ── */
    .footer {
      padding: 32px 40px;
      display: flex;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .nav { padding: 14px 16px; padding-top: calc(14px + env(safe-area-inset-top)); }
      .nav-logo { font-size: 0.85rem; }
      .login-wrapper { padding: 24px 20px; }
      .login-card h1 { font-size: 1.5rem; }
      .footer { padding: 24px 20px; padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
    }

    @media (prefers-reduced-motion: reduce) {
      .login-btn { transition: none; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-logo"><svg class="nav-icon" viewBox="0 0 28 28" width="22" height="22" style="vertical-align: middle; margin-right: 8px;"><g transform="translate(14,14)"><path d="M0,-10 L3,-3.5 L9.5,-5.5Z" fill="#4B7BF5" opacity="0.95"/><path d="M9.5,-5.5 L3.5,0 L9.5,5.5Z" fill="#6390F6" opacity="0.85"/><path d="M9.5,5.5 L2,3.5 L0,11Z" fill="#7BA1F7" opacity="0.75"/><path d="M0,11 L-3,3.5 L-9.5,5.5Z" fill="#4B7BF5" opacity="0.95"/><path d="M-9.5,5.5 L-3.5,0 L-9.5,-5.5Z" fill="#6390F6" opacity="0.85"/><path d="M-9.5,-5.5 L-2,-3.5 L0,-10Z" fill="#7BA1F7" opacity="0.75"/><circle cx="0" cy="0" r="2.2" fill="#7BA1F7" opacity="0.5"/></g></svg>Beyond Utility <span>Water Ventures</span></a>
    <a href="index.html" class="nav-back">&larr; Back</a>
  </nav>

  <div class="login-wrapper">
    <div class="login-card">
      <h1>Partner Login</h1>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
        </div>
        <button type="submit" class="login-btn">Log In</button>
        <div class="login-error" id="loginError">Invalid username or password. Please try again.</div>
      </form>
    </div>
  </div>

  <footer class="footer">
    <span>&copy; 2026 Beyond Utility Water Ventures</span>
  </footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    // If already logged in and has a profile, go straight to dashboard
    BUAuth.currentUser().then(async user => {
      if (!user) return;
      const profile = await BUAuth.getProfile(user.uid);
      if (profile) {
        window.location.href = 'dashboard.html';
      } else {
        // Auth account exists but profile was removed — sign them out
        await BUAuth.logout();
      }
    });

    const loginBtn = document.querySelector('.login-btn');

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in…';

      try {
        const cred = await BUAuth.login(email, password);

        // Check if user has a Firestore profile (admin may have removed them)
        const profile = await BUAuth.getProfile(cred.user.uid);
        if (!profile) {
          // Check if this is the very first user (bootstrap case)
          const snapshot = await db.collection('users').limit(1).get();
          if (!snapshot.empty) {
            // Users exist but this person was removed — block access
            await BUAuth.logout();
            errorEl.textContent = 'This account has been deactivated. Contact your administrator.';
            errorEl.classList.add('visible');
            loginBtn.disabled = false;
            loginBtn.textContent = 'Log In';
            return;
          }
        }

        window.location.href = 'dashboard.html';
      } catch (err) {
        errorEl.textContent = err.code === 'auth/invalid-credential'
          ? 'Invalid email or password. Please try again.'
          : err.code === 'auth/too-many-requests'
          ? 'Too many attempts. Please wait and try again.'
          : 'Login failed. Please try again.';
        errorEl.classList.add('visible');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Log In';
      }
    });

    // Clear error when user starts typing
    document.getElementById('email').addEventListener('input', function() {
      document.getElementById('loginError').classList.remove('visible');
    });
    document.getElementById('password').addEventListener('input', function() {
      document.getElementById('loginError').classList.remove('visible');
    });
  </script>

</body>
</html>
